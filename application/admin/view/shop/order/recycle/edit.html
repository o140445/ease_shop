<form id="edit-form" class="form-horizontal" role="form" data-toggle="validator" method="POST" action="">

    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Order_no')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-order_no" data-rule="required" class="form-control" name="row[order_no]" type="text" value="{$row.order_no|htmlentities}">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('User_name')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-user_id" data-rule="required" min="0" data-source="shop/user/index" data-field="nickname" class="form-control selectpage" name="row[user_id]" type="text" value="{$row.user_id|htmlentities}">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Order_status')}:</label>
        <div class="col-xs-12 col-sm-8">
            <select id="c-order_status" data-rule="required" class="form-control selectpicker" name="row[order_status]">
                <option value="unpaid" {in name="row.order_status" value="unpaid"}selected{/in}>{:__('Status unpaid')}</option>
                <option value="paid" {in name="row.order_status" value="paid"}selected{/in}>{:__('Status paid')}</option>
                <option value="shipped" {in name="row.order_status" value="shipped"}selected{/in}>{:__('Status shipped')}</option>
                <option value="completed" {in name="row.order_status" value="completed"}selected{/in}>{:__('Status completed')}</option>
                <option value="cancelled" {in name="row.order_status" value="cancelled"}selected{/in}>{:__('Status cancelled')}</option>
                <option value="recycled" {in name="row.order_status" value="recycled"}selected{/in}>{:__('Status recycled')}</option>
            </select>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Pay_status')}:</label>
        <div class="col-xs-12 col-sm-8">
            <select id="c-pay_status" data-rule="required" class="form-control selectpicker" name="row[pay_status]">
                <option value="unpaid" {in name="row.pay_status" value="unpaid"}selected{/in}>{:__('Pay_status unpaid')}</option>
                <option value="paid" {in name="row.pay_status" value="paid"}selected{/in}>{:__('Pay_status paid')}</option>
            </select>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Pay_amount')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-pay_amount" data-rule="required" min="0" class="form-control" step="0.01" name="row[pay_amount]" type="number" value="{$row.pay_amount|htmlentities}">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Recycle_amount')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-recycle_amount" data-rule="required" min="0" class="form-control" step="0.01" name="row[recycle_amount]" type="number" value="{$row.recycle_amount|htmlentities}">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Total_quantity')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-total_quantity" data-rule="required" min="0" class="form-control" name="row[total_quantity]" type="number" value="{$row.total_quantity|htmlentities}">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Status')}:</label>
        <div class="col-xs-12 col-sm-8">
            
            <div class="radio">
            {foreach name="statusList" item="vo"}
            <label for="row[status]-{$key}"><input id="row[status]-{$key}" name="row[status]" type="radio" value="{$key}" {in name="key" value="$row.status"}checked{/in} /> {$vo}</label> 
            {/foreach}
            </div>

        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Memo')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-memo" data-rule="required" class="form-control" name="row[memo]" type="text" value="{$row.memo|htmlentities}">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Recycletime')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-recycletime" min="0" class="form-control datetimepicker" data-date-format="YYYY-MM-DD HH:mm:ss" data-use-current="true" name="row[recycletime]" type="text" value="{:$row.recycletime?datetime($row.recycletime):''}">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Restoretime')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-restoretime" min="0" class="form-control datetimepicker" data-date-format="YYYY-MM-DD HH:mm:ss" data-use-current="true" name="row[restoretime]" type="text" value="{:$row.restoretime?datetime($row.restoretime):''}">
        </div>
    </div>
    <div class="form-group layer-footer">
        <label class="control-label col-xs-12 col-sm-2"></label>
        <div class="col-xs-12 col-sm-8">
            <button type="submit" class="btn btn-primary btn-embossed disabled">{:__('OK')}</button>
        </div>
    </div>
</form>
