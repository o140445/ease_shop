<form id="return-form" class="form-horizontal" role="form" data-toggle="validator" method="POST" action="">
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-3">{:__('Order_no')}:</label>
        <div class="col-xs-12 col-sm-7">
            <input class="form-control" type="text" value="{$row.order_no|htmlentities}" readonly>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-3">{:__('Pay_amount')}:</label>
        <div class="col-xs-12 col-sm-7">
            <input class="form-control" type="text" value="{$row.pay_amount|htmlentities}" readonly>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-3">{:__('Return_amount')}:</label>
        <div class="col-xs-12 col-sm-7">
            <input id="c-return_money" data-rule="required" min="0.01" max="{$row.pay_amount|htmlentities}" class="form-control" step="0.01" name="return_money" type="number" value="{$row.pay_amount|htmlentities}">
        </div>
    </div>
    <div class="form-group layer-footer">
        <label class="control-label col-xs-12 col-sm-3"></label>
        <div class="col-xs-12 col-sm-7">
            <button type="submit" class="btn btn-primary btn-embossed">{:__('OK')}</button>
        </div>
    </div>
</form>
