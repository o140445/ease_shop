<!DOCTYPE html>
<html lang="{$shopLang|default='ar'|htmlentities}" dir="{$shopLang=='ar'?'rtl':'ltr'}">
<head>
    {include file="common/meta" /}
    <link href="__CDN__/assets/libs/bootstrap/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="__CDN__/assets/libs/font-awesome/css/font-awesome.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="__CDN__/assets/css/shop.css?v={$Think.config.site.version|htmlentities}" rel="stylesheet">
</head>
<body class="shop-ease-body shop-center-page-body bg-slate-50">
<div class="shop-ease-page">
    {include file="common/shop_header" /}
    <main class="shop-ease-container">
        <div class="shop-center-shell">
            {include file="common/shop_center_sidebar" /}
            <section class="shop-center-content shop-center-card">
                <div class="shop-center-page-head">
                    <a class="shop-center-back" href="{:url('center/account', ['lang' => $shopLang])}"><i class="fa fa-angle-left"></i></a>
                    <div>
                        <h1>{:__('Change password')}</h1>
                    </div>
                </div>
                <form class="shop-center-form is-narrow" method="post" action="{:url('center/password', ['lang' => $shopLang])}">
                    <label>
                        <span>{:__('Old password')}</span>
                        <input type="password" name="oldpassword" autocomplete="current-password" required>
                    </label>
                    <label>
                        <span>{:__('New password')}</span>
                        <input type="password" name="newpassword" autocomplete="new-password" required>
                    </label>
                    <label>
                        <span>{:__('Confirm new password')}</span>
                        <input type="password" name="renewpassword" autocomplete="new-password" required>
                    </label>
                    <button type="submit">{:__('Confirm change')}</button>
                </form>
            </section>
        </div>
    </main>
    {include file="common/shop_footer" /}
</div>
{include file="common/script" /}
</body>
</html>
